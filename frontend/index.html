<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Todo App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 26px;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #4361ee; }

    button.add-btn {
      padding: 12px 20px;
      background: #4361ee;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button.add-btn:hover { background: #3451d1; }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 8px;
      margin-bottom: 10px;
      background: #f8f9ff;
      border: 1px solid #eee;
      transition: opacity 0.2s;
    }

    .todo-item.done { opacity: 0.5; }

    .todo-item span {
      flex: 1;
      font-size: 15px;
      color: #333;
    }

    .todo-item.done span { text-decoration: line-through; }

    input[type="checkbox"] {
      width: 18px; height: 18px;
      accent-color: #4361ee;
      cursor: pointer;
    }

    button.del-btn {
      background: none;
      border: none;
      color: #e74c3c;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
    }

    button.del-btn:hover { background: #ffeaea; }

    .empty {
      text-align: center;
      color: #aaa;
      font-size: 14px;
      padding: 20px 0;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Ma Todo List</h1>

  <div class="input-row">
    <input type="text" id="newTask" placeholder="Ajouter une tâche..." />
    <button class="add-btn" onclick="addTask()">Ajouter</button>
  </div>

  <div id="taskList"></div>
</div>

<script>
  // Adresse du backend — en production Docker, on appelle le service "backend"
  const API = 'http://localhost:3000/tasks';

  // Charger toutes les tâches au démarrage
  async function loadTasks() {
    const res  = await fetch(API);
    const tasks = await res.json();
    const list  = document.getElementById('taskList');

    if (tasks.length === 0) {
      list.innerHTML = '<p class="empty">Aucune tâche pour le moment</p>';
      return;
    }

    list.innerHTML = tasks.map(t => `
      <div class="todo-item ${t.done ? 'done' : ''}" id="task-${t.id}">
        <input type="checkbox" ${t.done ? 'checked' : ''}
               onchange="toggleTask(${t.id}, this.checked)" />
        <span>${t.title}</span>
        <button class="del-btn" onclick="deleteTask(${t.id})">✕</button>
      </div>
    `).join('');
  }

  // Ajouter une tâche
  async function addTask() {
    const input = document.getElementById('newTask');
    const title = input.value.trim();
    if (!title) return;

    await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title })
    });

    input.value = '';
    loadTasks();
  }

  // Cocher / décocher une tâche
  async function toggleTask(id, done) {
    await fetch(`${API}/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ done })
    });
    loadTasks();
  }

  // Supprimer une tâche
  async function deleteTask(id) {
    await fetch(`${API}/${id}`, { method: 'DELETE' });
    loadTasks();
  }

  // Ajouter avec la touche Entrée
  document.getElementById('newTask')
    .addEventListener('keypress', e => { if (e.key === 'Enter') addTask(); });

  // Lancer au chargement
  loadTasks();
</script>
</body>
</html>
